<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
  <meta name="theme-color" content="#f6f4ef">
  <meta name="description" content="Generator refundacji dla kontrahentów i indeksów">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Generator refundacji</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap">

  <link rel="stylesheet" href="./styles.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="./app.js" defer></script>
</head>
<body data-active-step="clients">
  <div class="app-shell">

    <!-- ================ TOPBAR (slim, pinned to very top) ================ -->
    <header class="topbar" role="banner">
      <span class="topbar-mark" aria-hidden="true"></span>
      <span class="topbar-title-text">Refundacje</span>
      <span class="topbar-spacer"></span>
      <button id="installBtn" class="icon-btn hidden" type="button" aria-label="Zainstaluj aplikację" title="Zainstaluj">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" x2="12" y1="15" y2="3"/>
        </svg>
      </button>
      <button id="reloadBtn" class="icon-btn" type="button" aria-label="Odśwież dane" title="Odśwież dane">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
      </button>
    </header>

    <!-- ================ STATUS BAR (mini icon stepper) ================ -->
    <section class="ux-status-card" aria-live="polite" aria-label="Postęp pracy">
      <button id="progressBackBtn" class="icon-btn back-btn" type="button" aria-label="Wróć do poprzedniego kroku" title="Wstecz">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>

      <div class="step-track" role="tablist">
        <button class="step-dot" data-step="1" data-open="clients" type="button" role="tab" aria-label="Krok 1: Kontrahenci" title="Kontrahenci">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </button>
        <span class="step-line" data-segment="1-2" aria-hidden="true"></span>
        <button class="step-dot" data-step="2" data-open="products" type="button" role="tab" aria-label="Krok 2: Indeksy" title="Indeksy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
            <path d="m3.3 7 8.7 5 8.7-5"/>
            <path d="M12 22V12"/>
          </svg>
        </button>
        <span class="step-line" data-segment="2-3" aria-hidden="true"></span>
        <button class="step-dot" data-step="3" data-open="workspace" type="button" role="tab" aria-label="Krok 3: Refundacje" title="Refundacje">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect width="20" height="12" x="2" y="6" rx="2"/>
            <circle cx="12" cy="12" r="2"/>
            <path d="M6 12h.01"/>
            <path d="M18 12h.01"/>
          </svg>
        </button>
      </div>

      <span id="progressPercent" class="progress-percent">0%</span>

      <!-- Hidden but in DOM: keeps JS happy and helps screen readers -->
      <strong id="progressHeadline" class="visually-hidden"></strong>
      <small id="progressHint" class="visually-hidden"></small>
    </section>

    <!-- ================ MAIN WIZARD CONTENT ================ -->
    <main class="wizard">
      <section class="panel section-card" data-section="clients">
        <button class="section-toggle" type="button" data-open="clients">
          <span>
            <strong>1. Kontrahenci</strong>
            <small id="clientSectionInfo" class="muted">Szukaj po numerze, logo lub nazwie</small>
          </span>
          <span id="clientCountBadge" class="badge">0</span>
        </button>
        <div class="section-body" id="clientsBody">
          <div class="toolbar compact-toolbar">
            <input id="clientSearch" class="search-input" type="search" placeholder="Numer, logo lub nazwa kontrahenta">
            <div class="button-row two-actions compact-actions">
              <button id="selectVisibleClientsBtn" class="secondary-btn small-btn" type="button">Zaznacz widoczne</button>
              <button id="clearClientsBtn" class="ghost-btn small-btn" type="button">Wyczyść</button>
            </div>
          </div>

          <div class="subheader-row">
            <span id="clientResultsInfo" class="muted">0 wyników</span>
            <button id="goProductsBtn" class="link-btn bordered-link small-btn" type="button">Dalej →</button>
          </div>

          <div id="selectedClientsChips" class="chips"></div>
          <div id="clientList" class="result-list" aria-live="polite"></div>
        </div>
      </section>

      <section class="panel section-card" data-section="products">
        <button class="section-toggle" type="button" data-open="products">
          <span>
            <strong>2. Indeksy do założenia cen i refundacji</strong>
            <small id="productSectionInfo" class="muted">Szukaj po fragmencie: producent, nazwa, ID towaru, kod kreskowy</small>
          </span>
          <span id="workspaceCountBadge" class="badge">0</span>
        </button>
        <div class="section-body" id="productsBody">
          <div class="toolbar compact-toolbar">
            <input id="productSearch" class="search-input" type="search" placeholder="Producent, nazwa, ID, EAN — kolejność dowolna">
            <div class="button-row two-actions compact-actions">
              <button id="addVisibleProductsBtn" class="secondary-btn small-btn" type="button">Dodaj widoczne</button>
              <button id="goWorkspaceBtn" class="link-btn bordered-link small-btn" type="button">Refundacje →</button>
            </div>
          </div>

          <div class="subheader-row sticky-mini-subheader">
            <span id="productResultsInfo" class="muted">0 wyników</span>
            <span id="workspaceHelperText" class="muted">Dodane: 0</span>
          </div>

          <div id="productList" class="result-list product-list" aria-live="polite"></div>
        </div>
      </section>

      <section class="panel section-card" data-section="workspace">
        <button class="section-toggle" type="button" data-open="workspace">
          <span>
            <strong>3. Ceny i Refundacje</strong>
            <small id="exportSectionInfo" class="muted">Zakres dat, cena AC i refundacja</small>
          </span>
          <span id="exportRowsBadge" class="badge badge-accent">0</span>
        </button>
        <div class="section-body" id="workspaceBody">
          <div class="compact-card range-card compact-range-card">
            <div class="card-title-row">
              <strong>Zakres refundacji</strong>
              <small class="muted">wspólny dla eksportu</small>
            </div>
            <div class="field-grid two-col dates-grid">
              <label class="field-card">
                <span>Od</span>
                <input id="refundDateFrom" class="search-input compact-input" type="date">
              </label>
              <label class="field-card">
                <span>Do</span>
                <input id="refundDateTo" class="search-input compact-input" type="date">
              </label>
            </div>
          </div>

          <div class="workspace-toolbar compact-workspace-toolbar">
            <span id="bulkSelectionInfo" class="muted">0 zaznaczonych indeksów</span>
            <div class="button-row slim-actions compact-actions">
              <button id="selectAllWorkspaceBtn" class="secondary-btn small-btn" type="button">Zaznacz wszystkie</button>
              <button id="clearWorkspaceSelectionBtn" class="ghost-btn small-btn" type="button">Odznacz</button>
              <button id="clearWorkspaceBtn" class="ghost-btn small-btn" type="button">Wyczyść listę</button>
            </div>
          </div>

          <div id="workspaceCards" class="workspace-list"></div>
        </div>
      </section>
    </main>

    <!-- ================ STICKY ACTION BAR (workspace step) ================ -->
    <div id="stickyActionBar" class="sticky-action-bar mac-sticky-bar compact-sticky-bar">
      <div class="sticky-topline compact-topline">
        <div class="sticky-stat-pill">
          <strong id="stickyRowsCount">0</strong>
          <span>wierszy</span>
        </div>
        <div class="sticky-stat-pill secondary">
          <strong id="stickySelectedCount">0</strong>
          <span>zazn.</span>
        </div>
      </div>
      <div class="sticky-controls compact-sticky-controls">
        <input id="bulkAcPrice" class="search-input sticky-input compact-input" type="number" min="0" step="0.01" inputmode="decimal" placeholder="Cena AC">
        <input id="bulkRefundValue" class="search-input sticky-input compact-input" type="number" min="0" step="0.01" inputmode="decimal" placeholder="Refundacja">
        <button id="applyBulkRefundBtn" class="secondary-btn small-btn sticky-btn compact-btn" type="button">Zastosuj</button>
        <button id="stickyExportBtn" class="primary-btn small-btn sticky-btn compact-btn" type="button">Eksport</button>
      </div>
      <small id="exportReadinessHint" class="muted export-hint">Uzupełnij kroki, aby odblokować eksport.</small>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </div>
</body>
</html>
